spring.application.name=HindiTypingPro

# ── Database ──────────────────────────────────────────────────────────────────
# Render injects DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD
# from the linked PostgreSQL service. Fallbacks keep local dev working.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:hindi_typing_pro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hindi123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────────────────────
# Render injects PORT; fall back to 8080 for local dev
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET in Render environment variables (use a long random string)
app.jwt.secret=${JWT_SECRET:HindiTypingProSecretKey2024VeryLongSecretKeyForHS512AlgorithmSecurity}
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS in Render to your Vercel URL, e.g.:
#   https://hindi-typing-pro.vercel.app
# Multiple origins: comma-separated
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.hinditypingpro=INFO
