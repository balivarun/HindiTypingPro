spring.application.name=HindiTypingPro

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/hindi_typing_pro
spring.datasource.username=postgres
spring.datasource.password=hindi123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT
app.jwt.secret=HindiTypingProSecretKey2024VeryLongSecretKeyForHS512AlgorithmSecurity
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.hinditypingpro=INFO
