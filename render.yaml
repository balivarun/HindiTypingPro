services:
  - type: web
    name: hindi-typing-pro-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Database (from your other Render account) ──────────────────────────
      # Paste the JDBC URL from the other account's PostgreSQL → Connections tab
      # Format: jdbc:postgresql://<host>:<port>/<dbname>
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # ── Security ──────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── CORS — set to your Vercel frontend URL ────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://hindi-typing-pro.vercel.app
