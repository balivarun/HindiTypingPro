services:
  - type: web
    name: hindi-typing-pro-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Database (from your other Render account) ──────────────────────────
      # Paste the JDBC URL from the other account's PostgreSQL → Connections tab
      # Format: jdbc:postgresql://<host>:<port>/<dbname>
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # ── Security ──────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── CORS — set to your Vercel frontend URL ────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://hindi-typing-pro.vercel.app

      # ── Razorpay ──────────────────────────────────────────────────────────
      # Use rzp_test_* keys for testing, rzp_live_* for production
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # Optional: change price in paise (9900 = ₹99)
      - key: PREMIUM_PRICE_PAISE
        value: "9900"
