databases:
  - name: hindi-typing-pro-db
    databaseName: hindi_typing_pro
    plan: free

services:
  - type: web
    name: hindi-typing-pro-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: hindi-typing-pro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hindi-typing-pro-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: hindi-typing-pro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hindi-typing-pro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hindi-typing-pro-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://hindi-typing-pro.vercel.app
